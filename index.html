<style>
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

    --color-background-primary: #ffffff;
    --color-background-secondary: #f4f3ef;
    --color-background-tertiary: #ece9e2;
    --color-text-primary: #1f1e1c;
    --color-text-secondary: #6f6e69;
    --color-border-tertiary: rgba(0, 0, 0, 0.1);
    --color-border-secondary: rgba(0, 0, 0, 0.2);
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1f1e1c;
      --color-background-secondary: #2a2926;
      --color-background-tertiary: #34322e;
      --color-text-primary: #f0efe9;
      --color-text-secondary: #a8a59e;
      --color-border-tertiary: rgba(255, 255, 255, 0.12);
      --color-border-secondary: rgba(255, 255, 255, 0.22);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--color-background-primary);
    -webkit-text-size-adjust: 100%;
    overscroll-behavior-y: none;
  }

const STORAGE_KEY = 'wt-progress';
let progressData = {};
let activeId = WALKTHROUGHS[0].id;
let collapsedStages = {};
let collapsedRefs = {};

const ICON_PATHS = {
  receipt: '<path d="M6 2h12v20l-3-2-3 2-3-2-3 2V2z"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/>',
  po: '<path d="M6 2h9l3 3v17H6z"/><path d="M15 2v3h3"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="13" y2="15"/>',
  swap: '<path d="M4 4v5h5"/><path d="M20 20v-5h-5"/><path d="M5 9a8 8 0 0 1 14-3"/><path d="M19 15a8 8 0 0 1-14 3"/>',
  list: '<path d="M9 6h11"/><path d="M9 12h11"/><path d="M9 18h11"/><path d="m3 6 1 1 2-2"/><path d="m3 12 1 1 2-2"/><path d="m3 18 1 1 2-2"/>',
  bell: '<path d="M10 21a2 2 0 0 0 4 0"/><path d="M3.3 14A6.8 6.8 0 0 1 4 11a8 8 0 1 1 16 0 6.8 6.8 0 0 1 .7 3H3.3z"/>',
  mail: '<rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/>',
  box: '<path d="M12 3 3 7v10l9 4 9-4V7z"/><path d="M3 7l9 4 9-4"/><path d="M12 11v10"/>',
  truck: '<path d="M3 7h11v9H3z"/><path d="M14 11h4l3 3v2h-7z"/><circle cx="6.5" cy="18" r="1.5"/><circle cx="17.5" cy="18" r="1.5"/>',
  info: '<circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16"/><circle cx="12" cy="8" r="0.6" fill="currentColor" stroke="none"/>',
  check: '<path d="M5 12l4 4 10-10"/>',
  reset: '<path d="M3 12a9 9 0 1 0 2.6-6.4"/><path d="M3 4v5h5"/>'
};

function icon(name) {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" ' +
    'stroke-linecap="round" stroke-linejoin="round">' + (ICON_PATHS[name] || '') + '</svg>';
}

function itemKey(stageIdx, itemIdx) { return stageIdx + '-' + itemIdx; }

function getWtProgress(wt) {
  if (!progressData[wt.id]) progressData[wt.id] = {};
  return progressData[wt.id];
}

function totalItems(wt) {
  return wt.stages.reduce((sum, s) => sum + (s.items ? s.items.length : 0), 0);
}

function doneItems(wt) {
  const p = getWtProgress(wt);
  return Object.values(p).filter(Boolean).length;
}

async function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) progressData = JSON.parse(raw);
  } catch (e) {
    progressData = {};
  }
}

async function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progressData));
  } catch (e) {}
}

function renderBottomNav() {
  const nav = document.getElementById('bottom-nav');
  nav.innerHTML = '';
  WALKTHROUGHS.forEach(wt => {
    const total = totalItems(wt);
    const done = doneItems(wt);
    const complete = total && done === total;

    const btn = document.createElement('button');
    btn.className = 'bottom-nav-item' + (wt.id === activeId ? ' active' : '');
    btn.style.setProperty('--item-color', wt.color);
    btn.style.setProperty('--item-soft', wt.accentSoft);
    btn.innerHTML = '<span class="bottom-nav-icon">' + icon(wt.icon) + '</span><span>' + (wt.short || wt.name.split(' ')[0]) + '</span>' +
      (complete ? '<span class="bottom-nav-check"></span>' : '');
    btn.onclick = () => { activeId = wt.id; render(); window.scrollTo(0, 0); };
    nav.appendChild(btn);
  });
}

function renderAppBar(wt) {
  const total = totalItems(wt);
  const done = doneItems(wt);
  const pct = total ? Math.round((done / total) * 100) : 0;

  document.getElementById('app-bar').style.background = wt.color;
  document.getElementById('app-bar-icon').innerHTML = icon(wt.icon);
  document.getElementById('app-bar-title').textContent = wt.name;
  document.getElementById('app-bar-subtitle').textContent = done + ' / ' + total + ' steps complete';
  document.getElementById('app-bar-progress-fill').style.width = pct + '%';
  document.getElementById('app-bar-reset').innerHTML = icon('reset');

  const themeColor = document.querySelector('meta[name="theme-color"]');
  if (themeColor) themeColor.setAttribute('content', wt.color);
}

function renderItem(wt, stageIdx, itemIdx, item) {
  const isObj = typeof item === 'object';
  const text = isObj ? item.text : item;
  const note = isObj ? item.note : null;
  const key = itemKey(stageIdx, itemIdx);
  const checked = !!getWtProgress(wt)[key];

  const row = document.createElement('label');
  row.className = 'wt-item' + (checked ? ' checked' : '');

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = checked;
  cb.onchange = () => {
    const p = getWtProgress(wt);
    if (cb.checked) p[key] = true; else delete p[key];
    saveProgress();
    render();
  };

  const textWrap = document.createElement('span');
  textWrap.className = 'wt-item-text';
  textWrap.textContent = text;
  if (note) {
    const noteEl = document.createElement('span');
    noteEl.className = 'wt-item-note';
    noteEl.textContent = note;
    textWrap.appendChild(noteEl);
  }
  if (isObj && item.link) {
    const linkEl = document.createElement('a');
    linkEl.className = 'wt-item-link';
    linkEl.textContent = item.link.text;
    linkEl.onclick = (e) => {
      e.preventDefault();
      activeId = item.link.target;
      render();
    };
    textWrap.appendChild(linkEl);
  }

  row.appendChild(cb);
  row.appendChild(textWrap);
  return row;
}

function renderStage(wt, stageIdx, displayNum, stage) {
  const wrap = document.createElement('div');
  const stageDone = stage.items.filter((_, i) => getWtProgress(wt)[itemKey(stageIdx, i)]).length;
  const allDone = stageDone === stage.items.length;
  wrap.className = 'wt-stage' + (collapsedStages[wt.id + '-' + stageIdx] ? ' collapsed' : '') + (allDone ? ' all-done' : '') + (stage.muted ? ' muted' : '');

  const head = document.createElement('div');
  head.className = 'wt-stage-head';
  head.onclick = () => {
    const k = wt.id + '-' + stageIdx;
    collapsedStages[k] = !collapsedStages[k];
    render();
  };

  const num = document.createElement('div');
  num.className = 'wt-stage-num' + (allDone ? ' done' : '');
  num.innerHTML = allDone ? icon('check') : displayNum;

  const title = document.createElement('div');
  title.className = 'wt-stage-title';
  title.textContent = stage.title;

  const count = document.createElement('div');
  count.className = 'wt-stage-count';
  count.textContent = stageDone + '/' + stage.items.length;

  const chevron = document.createElement('div');
  chevron.className = 'wt-chevron';
  chevron.textContent = '\u25be';

  head.appendChild(num);
  head.appendChild(title);
  head.appendChild(count);
  head.appendChild(chevron);

  const body = document.createElement('div');
  body.className = 'wt-stage-body';
  stage.items.forEach((item, i) => body.appendChild(renderItem(wt, stageIdx, i, item)));

  wrap.appendChild(head);
  wrap.appendChild(body);
  return wrap;
}

function renderRef(wt, refIdx, ref) {
  const wrap = document.createElement('div');
  const key = wt.id + '-' + refIdx;
  wrap.className = 'wt-ref' + (collapsedRefs[key] !== false ? ' collapsed' : '');

  const head = document.createElement('div');
  head.className = 'wt-ref-head';
  head.onclick = () => {
    collapsedRefs[key] = collapsedRefs[key] === false ? true : false;
    render();
  };

  const title = document.createElement('div');
  title.className = 'wt-ref-title';
  title.innerHTML = icon('info') + '<span>' + ref.title + '</span>';

  const chevron = document.createElement('div');
  chevron.className = 'wt-chevron';
  chevron.textContent = '\u25be';

  head.appendChild(title);
  head.appendChild(chevron);

  const body = document.createElement('div');
  body.className = 'wt-ref-body';

  if (ref.table) {
    const table = document.createElement('table');
    const headRow = document.createElement('tr');
    ref.table.head.forEach(h => {
      const th = document.createElement('th');
      th.textContent = h;
      headRow.appendChild(th);
    });
    table.appendChild(headRow);
    ref.table.rows.forEach(r => {
      const tr = document.createElement('tr');
      r.forEach(c => {
        const td = document.createElement('td');
        td.textContent = c;
        tr.appendChild(td);
      });
      table.appendChild(tr);
    });
    const scroll = document.createElement('div');
    scroll.className = 'wt-table-scroll';
    scroll.appendChild(table);
    body.appendChild(scroll);
  } else if (ref.html) {
    body.innerHTML = ref.html;
  }

  wrap.appendChild(head);
  wrap.appendChild(body);
  return wrap;
}

function renderBanner(banner) {
  const wrap = document.createElement('div');
  wrap.className = 'wt-banner';

  let html = '<div class="wt-banner-head">' + icon('info') +
    '<span class="wt-banner-title">' + (banner.title || '') + '</span>' +
    '<span class="wt-banner-tag">For information only</span></div>';

  if (banner.text) html += '<p>' + banner.text + '</p>';

  (banner.groups || []).forEach(group => {
    html += '<div class="wt-banner-group">';
    if (group.title) html += '<div class="wt-banner-group-title">' + group.title + '</div>';
    html += '<ul>' + group.items.map(it => '<li>' + (typeof it === 'object' ? it.text : it) + '</li>').join('') + '</ul>';
    html += '</div>';
  });

  wrap.innerHTML = html;
  return wrap;
}

function render() {
  const wt = WALKTHROUGHS.find(w => w.id === activeId);

  const root = document.getElementById('wt-root');
  root.style.setProperty('--accent', wt.color);
  root.style.setProperty('--accent-soft', wt.accentSoft);

  renderAppBar(wt);
  renderBottomNav();

  const content = document.getElementById('wt-content');
  content.innerHTML = '';
  let displayNum = 0;
  wt.stages.forEach((stage, i) => {
    if (stage.type === 'banner') {
      content.appendChild(renderBanner(stage));
    } else {
      displayNum += 1;
      content.appendChild(renderStage(wt, i, displayNum, stage));
    }
  });
  (wt.refs || []).forEach((ref, i) => content.appendChild(renderRef(wt, i, ref)));

  document.getElementById('app-bar-reset').onclick = () => {
    if (confirm('Reset progress for ' + wt.name + '?')) {
      progressData[wt.id] = {};
      saveProgress();
      render();
    }
  };
}

loadProgress().then(render);
</script>
